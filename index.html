<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calculateur de matériaux</title>

<style>
body {
    font-family: Arial;
    background: #0b1220;
    color: white;
    padding: 20px;
}
h1 {
    text-align: center;
}
.container {
    max-width: 600px;
    margin: auto;
}
.item {
    margin: 10px 0;
}
input {
    width: 60px;
}
button {
    margin-top: 20px;
    padding: 10px;
    width: 100%;
    background: #1e90ff;
    color: white;
    border: none;
    cursor: pointer;
}
.result {
    margin-top: 20px;
    background: #111;
    padding: 15px;
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="container">
<h1>Calculateur de matériaux</h1>

<!-- INPUTS -->

<div class="item">Borne de recharge : <input type="number" id="borne" value="0"></div>
<div class="item">Radar : <input type="number" id="radar" value="0"></div>
<div class="item">Panneau pédestre : <input type="number" id="panneau1" value="0"></div>
<div class="item">Panneau triple : <input type="number" id="panneau2" value="0"></div>
<div class="item">Panneau mural : <input type="number" id="panneau3" value="0"></div>

<div class="item">Microphone : <input type="number" id="micro" value="0"></div>
<div class="item">Micro perche : <input type="number" id="perche" value="0"></div>
<div class="item">Caméra épaule : <input type="number" id="camera" value="0"></div>

<button onclick="calculer()">Calculer</button>

<div class="result" id="resultat"></div>
</div>

<script>
function calculer() {

    let total = {
        organique: 0,
        alliage: 0,
        electronique: 0,
        polyester: 0,
        polymere: 0
    };

    function add(qty, o,a,e,p,po) {
        total.organique += qty * o;
        total.alliage += qty * a;
        total.electronique += qty * e;
        total.polyester += qty * p;
        total.polymere += qty * po;
    }

    add(borne.value, 10,40,35,5,10);
    add(radar.value, 0,10,10,2,3);
    add(panneau1.value,10,15,15,3,7);
    add(panneau2.value,20,20,30,19,11);
    add(panneau3.value,30,40,50,12,18);

    add(micro.value,0,0,2,0,2);
    add(perche.value,0,0,2,0,4);
    add(camera.value,0,0,3,0,2);

    document.getElementById("resultat").innerHTML =
        ":bricks: Organiques : " + total.organique + "<br>" +
        ":nut_and_bolt: Alliage : " + total.alliage + "<br>" +
        ":computer: Electronique : " + total.electronique + "<br>" +
        ":thread: Polyester : " + total.polyester + "<br>" +
        ":test_tube: Polymère : " + total.polymere;
}
</script>

</body>
</html>
